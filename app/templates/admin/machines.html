<!-- app/templates/admin/machines.html -->
{% extends "base.html" %}

{% block title %}Machine Management{% endblock %}

{% block content %}
<style>
    .container { max-width: 800px; }
    h1 { text-align: center; margin-bottom: 2rem; }
    .station-card {
        background: #fff;
        border: 1px solid #ddd;
        border-radius: 8px;
        padding: 1.5em;
        margin-bottom: 1em;
        display: flex;
        justify-content: space-between;
        align-items: center;
    }
    .station-info h3 {
        margin: 0 0 0.5em 0;
        text-transform: capitalize;
    }
    .controls { display: flex; align-items: center; gap: 0.5em; }
    .controls input {
        width: 60px;
        padding: 0.5em;
        text-align: center;
        font-size: 1.2em;
    }
    .controls button {
        padding: 0.6em 1.2em;
        font-size: 1em;
        border: none;
        border-radius: 5px;
        cursor: pointer;
        background-color: #3498db;
        color: white;
    }
    .controls button:disabled { background-color: #bdc3c7; }
    #status-message {
        text-align: center;
        margin-top: 1em;
        padding: 0.8em;
        border-radius: 5px;
        display: none; /* Hidden by default */
    }
    .status-success { background-color: #d4edda; color: #155724; }
    .status-error { background-color: #f8d7da; color: #721c24; }
</style>

<div class="container">
    <h1>Machine Management</h1>
    <p style="text-align: center;">Adjust the number of available machines for each station.</p>

    <div id="stations-list">
        <!-- JS will populate this list -->
    </div>

    <div id="status-message"></div>
</div>

<script src="/static/js/machines.js"></script>
{% endblock %}
