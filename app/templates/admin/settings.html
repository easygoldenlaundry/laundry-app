<!-- app/templates/admin/settings.html -->
{% extends "base.html" %}

{% block title %}Settings{% endblock %}

{% block content %}
<style>
    .container { max-width: 900px; }
    h1 { text-align: center; margin-bottom: 2rem; }
    .settings-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
        gap: 2rem;
    }
    .settings-card {
        background: #fff;
        border: 1px solid #ddd;
        border-radius: 8px;
        padding: 1.5em;
    }
    .settings-card h3 {
        margin-top: 0;
        border-bottom: 2px solid #eee;
        padding-bottom: 0.5em;
        margin-bottom: 1em;
    }
    .form-group {
        margin-bottom: 1.25em;
        display: flex;
        flex-direction: column;
        align-items: flex-start;
    }
    .form-group label {
        font-weight: 500;
        margin-bottom: 0.5em;
    }
    .form-group input {
        width: 100%;
        padding: 0.5em;
        border: 1px solid #ccc;
        border-radius: 4px;
        box-sizing: border-box;
    }
    .save-btn-container { text-align: center; margin-top: 2em; }
    #save-btn {
        padding: 0.8em 2em;
        font-size: 1.2em;
        border: none;
        border-radius: 5px;
        cursor: pointer;
        background-color: #28a745;
        color: white;
    }
    #status-message {
        text-align: center;
        margin-top: 1em;
        padding: 0.8em;
        border-radius: 5px;
        display: none;
    }
    .status-success { background-color: #d4edda; color: #155724; }
    .status-error { background-color: #f8d7da; color: #721c24; }
</style>

<div class="container">
    <h1>Application Settings</h1>

    <div class="settings-grid">
        <div class="settings-card" id="pricing-settings">
            <h3>Pricing & Delivery</h3>
            <div class="form-group">
                <label for="price_per_load">Price per Load (R)</label>
                <input type="number" step="0.01" id="price_per_load" data-key="price_per_load">
            </div>
            <div class="form-group">
                <label for="express_delivery_hours">Express Delivery (Hours)</label>
                <input type="number" id="express_delivery_hours" data-key="express_delivery_hours">
            </div>
            <div class="form-group">
                <label for="next_day_delivery_hours">Next Day Delivery (Hours)</label>
                <input type="number" id="next_day_delivery_hours" data-key="next_day_delivery_hours">
            </div>
        </div>

        <div class="settings-card" id="cycle-time-settings">
            <h3>Machine Cycle Times</h3>
            <div class="form-group">
                <label for="wash_cycle_time_seconds">Washing Time (seconds)</label>
                <input type="number" id="wash_cycle_time_seconds" data-key="wash_cycle_time_seconds">
            </div>
            <div class="form-group">
                <label for="dry_cycle_time_seconds">Drying Time (seconds)</label>
                <input type="number" id="dry_cycle_time_seconds" data-key="dry_cycle_time_seconds">
            </div>
            <div class="form-group">
                <label for="fold_cycle_time_seconds">Folding Time (seconds)</label>
                <input type="number" id="fold_cycle_time_seconds" data-key="fold_cycle_time_seconds">
            </div>
        </div>

        <div class="settings-card" id="machine-settings">
            <h3>Hub & Machines</h3>
            <div class="form-group">
                <label for="washing_machine_count">Number of Washing Machines</label>
                <input type="number" id="washing_machine_count" data-key="washing_machine_count" min="0">
            </div>
            <div class="form-group">
                <label for="drying_machine_count">Number of Drying Machines</label>
                <input type="number" id="drying_machine_count" data-key="drying_machine_count" min="0">
            </div>
            <div class="form-group">
                <label for="folding_machine_count">Number of Folding Machines</label>
                <input type="number" id="folding_machine_count" data-key="folding_machine_count" min="0">
            </div>
        </div>
        
        <div class="settings-card" id="qr-code-settings">
            <h3>QR & Secret Codes</h3>
             <div class="form-group">
                <label for="hub_intake_qr_code">Hub Intake QR Code (for staff)</label>
                <input type="text" id="hub_intake_qr_code" data-key="hub_intake_qr_code">
            </div>
            <div class="form-group">
                <label for="driver_hub_delivery_qr">Driver Hub Delivery QR (driver scan)</label>
                <input type="text" id="driver_hub_delivery_qr" data-key="driver_hub_delivery_qr">
            </div>
            <div class="form-group">
                <label for="driver_hub_pickup_qr">Driver Hub Pickup QR (driver scan)</label>
                <input type="text" id="driver_hub_pickup_qr" data-key="driver_hub_pickup_qr">
            </div>
        </div>
    </div>
    
    <div class="save-btn-container">
        <button id="save-btn">Save All Settings</button>
    </div>

    <div id="status-message"></div>
</div>

<script src="/static/js/settings.js"></script>
{% endblock %}
