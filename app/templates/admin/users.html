<!-- app/templates/admin/users.html -->
{% extends "base.html" %}

{% block title %}User Management{% endblock %}

{% block content %}
<style>
    .user-management-container { max-width: 1200px; margin: 2em auto; background: #fff; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); overflow: hidden; }
    .header { padding: 1.5em; border-bottom: 1px solid #eee; }
    .header h1 { margin: 0; }
    .table-wrapper { padding: 1.5em; }
    table { width: 100%; border-collapse: collapse; }
    th, td { text-align: left; padding: 1em; border-bottom: 1px solid #eee; vertical-align: middle; }
    th { background-color: #f8f9fa; }
    .status-active { color: #198754; }
    .status-inactive { color: #dc3545; }
    .switch { position: relative; display: inline-block; width: 60px; height: 34px; }
    .switch input { opacity: 0; width: 0; height: 0; }
    .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #ccc; transition: .4s; }
    .slider:before { position: absolute; content: ""; height: 26px; width: 26px; left: 4px; bottom: 4px; background-color: white; transition: .4s; }
    input:checked + .slider { background-color: #28a745; }
    input:focus + .slider { box-shadow: 0 0 1px #28a745; }
    input:checked + .slider:before { transform: translateX(26px); }
    .slider.round { border-radius: 34px; }
    .slider.round:before { border-radius: 50%; }

    .permissions-cell { min-width: 400px; }
    .permissions-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 0.5em; }
    .permissions-grid label { display: flex; align-items: center; gap: 0.5em; font-size: 0.9em; }
    .permissions-grid input { margin-right: 5px; }
    .btn-save { padding: 0.5em 1em; background-color: #0d6efd; color: white; border: none; border-radius: 4px; cursor: pointer; }
    .btn-save:disabled { background-color: #6c757d; }
    #status-message { text-align: center; margin-top: 1em; padding: 0.8em; border-radius: 5px; display: none; }
    .status-success { background-color: #d1e7dd; color: #0f5132; }
    .status-error { background-color: #f8d7da; color: #842029; }
</style>

<div class="user-management-container">
    <div class="header">
        <h1>User Management</h1>
        <p>Activate accounts and assign station permissions for staff.</p>
    </div>
    <div class="table-wrapper">
        <div id="status-message"></div>
        <table>
            <thead>
                <tr>
                    <th>Display Name</th>
                    <th>Role</th>
                    <th>Activate</th>
                    <th>Station Permissions (Staff Only)</th>
                </tr>
            </thead>
            <tbody id="users-table-body">
                <tr><td colspan="4" style="text-align:center;">Loading...</td></tr>
            </tbody>
        </table>
    </div>
</div>

<script src="/static/js/admin_users.js"></script>
{% endblock %}
