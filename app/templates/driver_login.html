<!-- app/templates/driver_login.html -->
{% extends "base.html" %}

{% block title %}Driver Login{% endblock %}

{% block content %}
<style>
    .login-container { max-width: 400px; margin: 5em auto; padding: 2em; border: 1px solid #ccc; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
    .form-group { margin-bottom: 1em; }
    label { display: block; margin-bottom: 0.5em; }
    input { width: 100%; padding: 0.8em; box-sizing: border-box; }
    button { width: 100%; padding: 1em; background-color: #007bff; color: white; border: none; border-radius: 4px; font-size: 1em; cursor: pointer; }
    .error { color: red; margin-top: 1em; text-align: center; }
</style>
<div class="login-container">
    <h1>Driver Login</h1>
    <form action="/driver/login" method="post">
        <div class="form-group">
            <label for="username">Username:</label>
            <input type="text" id="username" name="username" required value="driver1">
        </div>
        <button type="submit">Login</button>
    </form>
    {% if error %}
        <p class="error">{{ error }}</p>
    {% endif %}
</div>
{% endblock %}
